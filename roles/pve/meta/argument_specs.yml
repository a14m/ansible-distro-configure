---
argument_specs:
  main:
    options:
      pve_repo:
        type: "str"
        description: "Proxmox VE apt repository type (no-subscription or enterprise)"
        default: "no-subscription"
        choices:
          - "no-subscription"
          - "enterprise"
      pve_admin_user:
        type: "str"
        description: "PVE realm admin username"
        default: "admin"
      pve_admin_password:
        type: "str"
        description: "PVE realm admin password"
        default: "changeme"
