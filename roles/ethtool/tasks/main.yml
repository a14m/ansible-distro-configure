---
- name: "Install ethtool"
  become: true
  ansible.builtin.package:
    name: "ethtool"
    state: "present"

- name: "Deploy WoL systemd service"
  become: true
  ansible.builtin.template:
    src: "wol.service.j2"
    dest: "/etc/systemd/system/wol@{{ ethtool_wol_interface }}.service"
    owner: "root"
    group: "root"
    mode: "0644"
  notify: "Reload systemd"

- name: "Enable WoL service"
  become: true
  ansible.builtin.systemd_service:
    name: "wol@{{ ethtool_wol_interface }}.service"
    enabled: true
    state: "started"
    daemon_reload: true
  tags:
    # WoL service fails in containers — ethtool_wol_interface does not exist
    - "molecule-notest"

- name: "Ensure /etc/systemd/logind.conf.d exists"
  become: true
  ansible.builtin.file:
    path: "/etc/systemd/logind.conf.d"
    state: "directory"
    mode: "0755"

- name: "Configure lid switch on AC power"
  become: true
  ansible.builtin.template:
    src: "logind.conf.j2"
    dest: "/etc/systemd/logind.conf.d/wol.conf"
    mode: "0644"
  notify: "Reload systemd-logind"
