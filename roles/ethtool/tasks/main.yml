---
- name: "Install ethtool"
  become: true
  ansible.builtin.package:
    name: "ethtool"
    state: "present"

- name: "Deploy WoL systemd service"
  become: true
  ansible.builtin.template:
    src: "wol.service.j2"
    dest: "/etc/systemd/system/wol@{{ ethtool_wol_interface }}.service"
    owner: "root"
    group: "root"
    mode: "0644"
  notify: "Reload systemd"

- name: "Enable WoL service"
  become: true
  ansible.builtin.systemd_service:
    name: "wol@{{ ethtool_wol_interface }}.service"
    enabled: true
    state: "started"
    daemon_reload: true
