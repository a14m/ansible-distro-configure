---
- name: "Install garage binary"
  become: true
  vars:
    garage_arch: "{{ ansible_facts['architecture'] }}-unknown-linux-musl"
    garage_url: "https://garagehq.deuxfleurs.fr/_releases/v{{ garage_version }}/{{ garage_arch }}/garage"
  block:
    - name: "Check if garage is installed"
      ansible.builtin.stat:
        path: "/usr/local/bin/garage"
      register: garage_binary_check

    - name: "Download garage binary"
      when: not garage_binary_check.stat.exists
      ansible.builtin.get_url:
        url: "{{ garage_url }}"
        dest: "/usr/local/bin/garage"
        mode: "0755"
        owner: "root"
        group: "root"

- name: "Configure garage"
  become: true
  block:
    - name: "Create garage group"
      ansible.builtin.group:
        name: "garage"
        system: true

    - name: "Create garage user"
      ansible.builtin.user:
        name: "garage"
        group: "garage"
        system: true
        shell: "/usr/sbin/nologin"
        create_home: false

    - name: "Create garage directories"
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: "directory"
        owner: "{{ item.owner }}"
        group: "garage"
        mode: "0750"
      loop:
        - { path: "/etc/garage", owner: "root" }
        - { path: "{{ garage_data_dir }}", owner: "garage" }
        - { path: "{{ garage_meta_dir }}", owner: "garage" }

    - name: "Configure garage"
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "root"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
        no_log: true
        notify: "Restart garage"
      loop:
        - { src: "grage.toml.j2", dest: "/etc/garage/garage.toml", group: "garage", mode: "0640" }
        - { src: "garage.service.j2", dest: "/etc/systemd/system/garage.service", group: "root", mode: "0644" }

    - name: "Start and enable garage"
      ansible.builtin.systemd_service:
        name: "garage"
        state: "started"
        enabled: true
        daemon_reload: true

- name: "Provision garage bucket and key"
  become: true
  block:
    - name: "Deploy provision script"
      ansible.builtin.template:
        src: "garage-provision.sh.j2"
        dest: "/etc/garage/provision.sh"
        owner: "root"
        group: "garage"
        mode: "0750"
      no_log: true

    # Script is idempotent via internal state checks but always reports changed
    - name: "Run provision script"
      ansible.builtin.command:
        cmd: "/etc/garage/provision.sh"
      changed_when: true
      tags:
        - molecule-idempotence-notest
