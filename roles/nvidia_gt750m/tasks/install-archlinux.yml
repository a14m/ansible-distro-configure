---
- name: "Install NVIDIA driver from AUR"
  become: true
  become_user: "aur_builder"
  kewlfft.aur.aur:
    name: "{{ nvidia_gt750m_aur_packages }}"
    state: "present"
    use: "yay"

- name: "Configure NVIDIA DRM kernel mode setting"
  become: true
  ansible.builtin.template:
    src: "nvidia.conf.j2"
    dest: "/etc/modprobe.d/nvidia.conf"
    mode: "0644"
  notify:
    - "Run mkinitcpio"
  tags:
    - "molecule-notest"

- name: "Remove kms hook from mkinitcpio"
  become: true
  ansible.builtin.replace:
    path: "/etc/mkinitcpio.conf"
    regexp: "(HOOKS=\\([^)]*) kms"
    replace: '\1'
  notify:
    - "Run mkinitcpio"
  tags:
    - "molecule-notest"

- name: "Get current mkinitcpio MODULES"
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    grep '^MODULES=' /etc/mkinitcpio.conf | sed 's/MODULES=(\(.*\))/\1/'
  # noqa var-naming[no-role-prefix] as it describes the current kernel modules and not the nvidia modules
  register: "current_kernel_modules"
  changed_when: false
  args:
    executable: /bin/bash
  tags:
    - "molecule-notest"

- name: "Add NVIDIA modules to mkinitcpio"
  become: true
  vars:
    existing_modules: "{{ current_kernel_modules.stdout.split() | reject('in', nvidia_gt750m_modules) | list }}"
    all_modules: "{{ existing_modules + nvidia_gt750m_modules }}"
  ansible.builtin.lineinfile:
    path: "/etc/mkinitcpio.conf"
    regexp: "^MODULES=\\(.*\\)"
    line: "MODULES=({{ all_modules | join(' ') }})"
  notify:
    - "Run mkinitcpio"
  tags:
    - "molecule-notest"
