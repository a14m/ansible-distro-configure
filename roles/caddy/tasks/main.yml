---
- name: "Stop and disable nginx"
  become: true
  ansible.builtin.service:
    name: "nginx"
    state: "stopped"
    enabled: false
  failed_when: false

- name: "Include OS-specific installation tasks"
  ansible.builtin.include_tasks: "install-{{ ansible_facts['os_family'] | lower }}.yml"

- name: "Ensure caddy sites directory exists"
  become: true
  ansible.builtin.file:
    path: "/etc/caddy/sites"
    state: "directory"
    owner: "root"
    group: "caddy"
    mode: "0750"

- name: "Create Caddyfile"
  become: true
  ansible.builtin.template:
    src: "Caddyfile.j2"
    dest: "/etc/caddy/Caddyfile"
    owner: "root"
    group: "caddy"
    mode: "0640"
  notify: "Restart caddy"

- name: "Start and enable caddy"
  become: true
  ansible.builtin.service:
    name: "caddy"
    state: "started"
    enabled: true
