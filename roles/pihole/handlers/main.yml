---
- name: "Restart systemd-resolved"
  become: true
  ansible.builtin.systemd_service:
    name: "systemd-resolved"
    state: "restarted"

- name: "Restart NetworkManager"
  become: true
  ansible.builtin.systemd_service:
    name: "NetworkManager"
    state: "restarted"

- name: "Show install output"
  ansible.builtin.debug:
    var: pihole_install.stdout

- name: "Restart pihole-FTL"
  become: true
  ansible.builtin.systemd_service:
    name: "pihole-FTL"
    state: "restarted"

- name: "Restart nginx"
  listen: "Restart proxy"
  become: true
  ansible.builtin.systemd_service:
    name: "nginx"
    state: "restarted"
  when: proxy_type == "nginx"

- name: "Restart caddy"
  listen: "Restart proxy"
  become: true
  ansible.builtin.systemd_service:
    name: "caddy"
    state: "restarted"
  when: proxy_type == "caddy"
