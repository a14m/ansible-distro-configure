---
- name: "Deploy backup script"
  become: true
  ansible.builtin.template:
    src: "backup-systemd.sh.j2"
    dest: "/usr/local/bin/{{ backup_name }}-backup"
    owner: "root"
    group: "root"
    mode: "0755"

- name: "Deploy backup systemd service"
  become: true
  ansible.builtin.template:
    src: "backup.service.j2"
    dest: "/etc/systemd/system/{{ backup_name }}-backup.service"
    owner: "root"
    group: "root"
    mode: "0644"
  notify: "Reload systemd"

- name: "Deploy backup systemd timer"
  become: true
  ansible.builtin.template:
    src: "backup.timer.j2"
    dest: "/etc/systemd/system/{{ backup_name }}-backup.timer"
    owner: "root"
    group: "root"
    mode: "0644"
  notify: "Reload systemd"

- name: "Enable and start backup timer"
  become: true
  ansible.builtin.systemd_service:
    name: "{{ backup_name }}-backup.timer"
    enabled: true
    state: "started"
    daemon_reload: true
