---
argument_specs:
  main:
    options:
      rust_versions:
        type: "list"
        description: "Rust versions to install via mise (e.g. 'stable', 'nightly')"
        elements: "str"
        default: ["stable"]
      rust_components:
        type: "list"
        description: "Rust components to install via rustup (applied to the active toolchain)"
        elements: "str"
        default: []
